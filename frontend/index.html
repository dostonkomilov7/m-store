<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background:
        linear-gradient(135deg,
          #0f172a,
          #1e293b,
          #334155);

      font-family:
        Arial,
        sans-serif;

    }

    .container {

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;

    }

    .logo {

      font-size: 64px;
      font-weight: 800;
      letter-spacing: 2px;

      background:
        linear-gradient(90deg,
          #60a5fa,
          #a78bfa,
          #06b6d4);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 30px rgba(255, 255, 255, .1);

    }

    .subtitle {

      color:
        rgba(255, 255, 255, .65);

      font-size: 18px;

      margin-top: -18px;

    }

    .start-btn {

      padding: 18px 42px;

      font-size: 20px;
      font-weight: 600;

      border: none;
      border-radius: 16px;

      cursor: pointer;

      color: white;

      background:
        rgba(255, 255, 255, .1);

      backdrop-filter:
        blur(12px);

      box-shadow:
        0 10px 25px rgba(0, 0, 0, .25);

      transition: .35s;

      position: relative;

      overflow: hidden;

    }

    .start-btn::before {

      content: "";

      position: absolute;

      width: 150px;
      height: 160%;

      background:
        rgba(255, 255, 255, .15);

      transform:
        rotate(35deg) translateX(-200px);

      transition: .6s;

    }

    .start-btn:hover {

      transform:
        translateY(-4px) scale(1.04);

      box-shadow:
        0 18px 35px rgba(0, 0, 0, .35);

    }

    .start-btn:hover::before {

      transform:
        rotate(35deg) translateX(300px);

    }
  </style>

</head>

<body>

  <div class="container">

    <div class="logo">M-Store</div>

    <div class="subtitle">
      Modern Shopping Experience
    </div>

    <a href="/src/pages/dashboard">
      <button class="start-btn">
        Get Started →
      </button>
    </a>

  </div>

</body>

</html>
